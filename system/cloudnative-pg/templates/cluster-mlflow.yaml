{{- if .Values.clusters.mlflow.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mlflow-cluster
  namespace: {{ .Release.Namespace }}
spec:
  instances: 1
  
  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      
  # Storage configuration
  storage:
    size: 1Gi
    storageClass: local-path
    
  # Monitoring configuration
  monitoring:
    enablePodMonitor: true
    
  # Bootstrap configuration
  bootstrap:
    initdb:
      database: mlflowdb
      owner: mlflow
      secret:
        name: mlflow-cluster-superuser
        
  # Resource limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi" 
      cpu: "500m"
{{- end }}