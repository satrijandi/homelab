# Database cluster configurations
clusters:
  homelab:
    enabled: false
  mlflow:
    enabled: true

cloudnative-pg:
  # CloudNativePG operator configuration
  image:
    repository: ghcr.io/cloudnative-pg/cloudnative-pg
    tag: "1.27.0"
    pullPolicy: IfNotPresent

  # Resource limits for the operator
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Enable monitoring for Prometheus integration
  monitoring:
    enabled: true
    enablePodMonitor: true
    
  # Security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault

  # Node selector for development environment
  nodeSelector: {}
  
  # Tolerations
  tolerations: []
  
  # Affinity
  affinity: {}