---
# JWT Secret for Airflow API
apiVersion: v1
kind: Secret
metadata:
  name: airflow-jwt-secret
  namespace: airflow
  labels:
    app: airflow
    component: auth
type: Opaque
data:
  jwt_secret: bXktand0LXNlY3JldA==  # base64 encoded "my-jwt-secret"

---
# ConfigMap for DAG files
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-dags
  namespace: airflow
  labels:
    app: airflow
    component: dags
data:
  first_dag.py: |
    from datetime import datetime, timedelta
    from airflow import DAG
    from airflow.operators.bash import BashOperator

    # Define default arguments for the DAG
    default_args = {
        'owner': 'admin',
        'depends_on_past': False,
        'start_date': datetime(2025, 7, 30),
        'email_on_failure': False,
        'email_on_retry': False,
        'retries': 1,
        'retry_delay': timedelta(minutes=5),
    }

    # Define the DAG
    dag = DAG(
        'first_dag_hello_world',
        default_args=default_args,
        description='Simple Hello World DAG',
        schedule=None,  # Manual trigger only
        catchup=False,
        tags=['tutorial', 'hello_world'],
    )

    # Define a simple bash task
    hello_world_task = BashOperator(
        task_id='hello_world_bash',
        bash_command='echo "Hello World from Airflow!"',
        dag=dag,
    )

    # Single task DAG - no dependencies needed
    hello_world_task

---
# Airflow Configuration with JWT auth
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: airflow
  labels:
    app: airflow
    component: config
data:
  airflow.cfg: |
    [api_auth]
    jwt_secret = my-jwt-secret

    [celery]
    flower_url_prefix = 
    worker_concurrency = 16

    [celery_kubernetes_executor]
    kubernetes_queue = kubernetes

    [core]
    auth_manager = airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    colored_console_log = False
    dags_folder = /opt/airflow/dags
    execution_api_server_url = http://airflow-api-server:8080/execution/
    executor = CeleryExecutor
    load_examples = False
    remote_logging = False

    [elasticsearch]
    json_format = True
    log_id_template = {dag_id}_{task_id}_{execution_date}_{try_number}

    [elasticsearch_configs]
    max_retries = 3
    retry_timeout = True
    timeout = 30

    [kerberos]
    ccache = /var/kerberos-ccache/cache
    keytab = /etc/airflow.keytab
    principal = airflow@FOO.COM
    reinit_frequency = 3600

    [kubernetes]
    airflow_configmap = airflow-config
    airflow_local_settings_configmap = airflow-config
    multi_namespace_mode = False
    namespace = airflow
    pod_template_file = /opt/airflow/pod_templates/pod_template_file.yaml
    worker_container_repository = apache/airflow
    worker_container_tag = 3.0.2

    [kubernetes_executor]
    multi_namespace_mode = False
    namespace = airflow
    pod_template_file = /opt/airflow/pod_templates/pod_template_file.yaml
    worker_container_repository = apache/airflow
    worker_container_tag = 3.0.2

    [logging]
    colored_console_log = False
    remote_logging = False

    [metrics]
    statsd_host = airflow-statsd
    statsd_on = False
    statsd_port = 9125
    statsd_prefix = airflow

    [scheduler]
    run_duration = 41460
    standalone_dag_processor = True
    statsd_host = airflow-statsd
    statsd_on = False
    statsd_port = 9125
    statsd_prefix = airflow

    [webserver]
    enable_proxy_fix = True
    rbac = True

  airflow_local_settings.py: ""