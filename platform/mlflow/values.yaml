# MLflow Configuration for Homelab - Bitnami Chart
# Database configuration - disable embedded PostgreSQL, use external CloudNativePG
postgresql:
  enabled: false

externalDatabase:
  dialectDriver: "postgresql"
  host: "mlflow-cluster-rw.cloudnative-pg.svc.cluster.local"
  port: 5432
  user: "mlflow"
  password: "mlflow456"
  database: "mlflowdb"
  authDatabase: "mlflowdb"

# MinIO configuration - disable embedded MinIO, use external MinIO
minio:
  enabled: false

externalS3:
  host: "minio.minio.svc.cluster.local"
  port: 9000
  protocol: "http"
  bucket: "mlflow-bucket"
  accessKeyID: "admin"
  accessKeySecret: "homelab123"
  serveArtifacts: true

# MLflow tracking server configuration
tracking:
  enabled: true
  replicaCount: 1
  
  # Service configuration - NodePort for external access
  service:
    type: NodePort
    ports:
      http: 80
    nodePorts:
      http: "30500"
  
  # Authentication configuration
  auth:
    enabled: false  # Disable authentication for homelab
    
  # Resource configuration for development environment
  resourcesPreset: "small"
  
  # Health probes
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 5
  
  readinessProbe:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  
  # Enable Prometheus metrics
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: "monitoring"
      labels:
        release: prometheus
      interval: 30s
      
  # Pod security context
  podSecurityContext:
    enabled: true
    fsGroup: 1001
    
  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Ingress configuration - disabled, using NodePort
  ingress:
    enabled: false

  # Network policy configuration
  networkPolicy:
    enabled: true
    allowExternal: true

# MLflow run configuration - disable for tracking-only setup
run:
  enabled: false