# MLflow Configuration for Homelab
mlflow:
  # Database backend - using CloudNativePG PostgreSQL cluster
  backendStore:
    databaseMigration: true
    postgres:
      enabled: true
      host: "mlflow-cluster-rw.cloudnative-pg.svc.cluster.local"
      port: 5432
      database: "mlflowdb"
      user: "mlflow"
      password: "mlflow456"
      driver: "psycopg2"

  # Artifact storage - using MinIO S3-compatible storage
  artifactRoot:
    s3:
      enabled: true
      bucket: "mlflow-bucket"
      awsAccessKeyId: "admin"
      awsSecretAccessKey: "homelab123"
      path: ""  # Use root level of bucket
  
  # MinIO S3 endpoint configuration
  extraEnvVars:
    MLFLOW_S3_ENDPOINT_URL: "http://minio.minio.svc.cluster.local:9000"
    AWS_DEFAULT_REGION: "us-east-1"

  # Service configuration - NodePort for external access  
  service:
    enabled: true
    type: NodePort
    port: 5000

  # Resource configuration for development environment (reduced for k3d)
  resources:
    limits:
      memory: 512Mi
      cpu: 250m
    requests:
      memory: 256Mi
      cpu: 100m

  # Replica configuration
  replicaCount: 1

  # Image configuration
  image:
    repository: "burakince/mlflow"
    tag: "3.2.0"
    pullPolicy: IfNotPresent

  # Security context for k3d compatibility  
  securityContext:
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false

  podSecurityContext:
    fsGroup: 1001
    fsGroupChangePolicy: OnRootMismatch

  # Health probes
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 5

  readinessProbe:
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  # ServiceMonitor for Prometheus monitoring
  serviceMonitor:
    enabled: true
    namespace: "monitoring"
    labels:
      release: prometheus
    interval: 30s
    timeout: 10s
    telemetryPath: "/metrics"

  # Disable embedded databases (we use external PostgreSQL)
  postgresql:
    enabled: false
  mysql:
    enabled: false


  # Ingress configuration (disabled, using NodePort)
  ingress:
    enabled: false

  # Deployment strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  # Pod annotations
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5000"
    prometheus.io/path: "/metrics"

  # Node selector for development
  nodeSelector: {}
  
  # Tolerations
  tolerations: []
  
  # Affinity
  affinity: {}