pgadmin4:
  # PgAdmin authentication
  env:
    email: admin@homelab.com
    password: homelab123
  
  # Service configuration for NodePort access
  service:
    type: NodePort
    port: 80
    nodePort: 30085
    
  # Resource limits for development environment
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
      
  # Persistence for PgAdmin configuration
  persistentVolume:
    enabled: true
    size: 1Gi
    storageClass: local-path
    
  # Security context
  securityContext:
    runAsUser: 5050
    runAsGroup: 5050
    fsGroup: 5050
    
  # Pre-configured server connections
  serverDefinitions:
    enabled: true
    servers:
      homelab-postgres:
        Name: "CloudNativePG Homelab"
        Group: "Homelab"
        Host: "cluster-example-rw.cloudnative-pg.svc.cluster.local"
        Port: 5432
        MaintenanceDB: "homelab"
        Username: "homelab"
        Password: "homelab123"
        SSLMode: "prefer"
      mlflow-postgres:
        Name: "CloudNativePG MLflow"
        Group: "Homelab"
        Host: "mlflow-cluster-rw.cloudnative-pg.svc.cluster.local"
        Port: 5432
        MaintenanceDB: "mlflowdb"
        Username: "mlflow"
        Password: "mlflow456"
        SSLMode: "prefer"
        
  # Network policy for database access
  networkPolicy:
    enabled: false
    
  # Pod disruption budget
  podDisruptionBudget:
    enabled: false